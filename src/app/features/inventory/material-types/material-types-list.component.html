<p-toast position="bottom-right" />

<div class="space-y-6">
  <app-page-header title="Tipos de Materiais" subtitle="Categorias usadas para classificar os materiais do estoque.">
    <ng-container actions>
      @if (auth.hasPermission('Inventory.Materials.Manage')) {
        <p-button label="Novo Tipo" icon="pi pi-plus" (onClick)="openCreate()" />
      }
    </ng-container>
  </app-page-header>

  <div class="flex items-center gap-3">
    <p-iconfield class="w-full max-w-sm">
      <p-inputicon styleClass="pi pi-search" />
      <input
        pInputText
        type="text"
        placeholder="Buscar por nome..."
        class="w-full"
        (input)="onSearchInput($event)"
      />
    </p-iconfield>
  </div>

  <p-table
    [value]="filteredTypes()"
    [loading]="loading()"
    [paginator]="true"
    [rows]="10"
    [scrollable]="true"
    styleClass="p-datatable-sm"
  >
    <ng-template pTemplate="header">
      <tr>
        <th>Nome</th>
        <th>Status</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-type>
      <tr>
        <td>
          <span class="font-semibold">{{ type.name }}</span>
        </td>
        <td>
          <div class="flex items-center gap-2">
            <p-toggleswitch
              [ngModel]="type.active"
              [disabled]="!auth.hasPermission('Inventory.Materials.Manage')"
              (onChange)="toggleActive(type)"
            />
            <span class="text-sm" [class.text-green-600]="type.active" [class.text-muted-foreground]="!type.active">
              {{ type.active ? 'Ativo' : 'Inativo' }}
            </span>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="2" class="text-center py-8 text-muted-foreground">
          Nenhum tipo de material encontrado.
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-dialog
  [visible]="dialogVisible()"
  (visibleChange)="dialogVisible.set($event)"
  header="Novo Tipo de Material"
  [modal]="true"
  [closable]="true"
  [style]="{ width: '95vw', maxWidth: '480px' }"
>
  <form [formGroup]="form" novalidate>
    <div class="flex flex-col gap-1 mb-4">
      <label for="name" class="text-sm font-medium">Nome <span class="text-red-500">*</span></label>
      <input pInputText id="name" formControlName="name" class="w-full" />
      @if (form.get('name')?.errors?.['required'] && form.get('name')?.touched) {
        <span class="text-xs text-red-500">Nome é obrigatório.</span>
      }
    </div>

    <div class="flex items-center gap-2">
      <p-toggleswitch inputId="active" formControlName="active" />
      <label for="active" class="text-sm font-medium">Ativo</label>
    </div>
  </form>

  <ng-template #footer>
    <div class="flex justify-end gap-2">
      <p-button
        label="Cancelar"
        [outlined]="true"
        severity="secondary"
        (onClick)="onCancel()"
        [disabled]="saving()"
      />
      <p-button
        label="Salvar"
        [loading]="saving()"
        (onClick)="onSave()"
      />
    </div>
  </ng-template>
</p-dialog>
