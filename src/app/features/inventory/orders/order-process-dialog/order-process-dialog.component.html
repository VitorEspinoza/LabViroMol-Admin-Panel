<p-dialog
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  header="Processar Pedido"
  [modal]="true"
  [closable]="true"
  [style]="{ width: '95vw', maxWidth: '480px' }"
  (onShow)="onDialogShow()"
>
  <form [formGroup]="form" novalidate>
    <div class="flex flex-col gap-1 py-4">
      <label for="notes" class="text-sm font-medium">Notas de Processamento</label>
      <textarea pTextarea id="notes" formControlName="notes" rows="3" class="w-full"></textarea>
    </div>
  </form>

  <ng-template #footer>
    <div class="flex justify-end gap-2">
      <p-button
        label="Cancelar"
        [outlined]="true"
        severity="secondary"
        (onClick)="onCancel()"
        [disabled]="saving()"
      />
      <p-button
        label="Processar"
        [loading]="saving()"
        (onClick)="onProcess()"
      />
    </div>
  </ng-template>
</p-dialog>
