<div class="flex min-h-screen items-center justify-center bg-background px-4">
  <div class="w-full max-w-md rounded-lg border border-border bg-card p-8 shadow-sm">

    <div class="mb-6 flex items-center gap-3">
      <img ngSrc="images/logo.png" alt="Logo LabViroMol" width="40" height="40" priority />
      <div>
        <p class="text-lg font-semibold leading-tight text-foreground">LabViroMol</p>
        <p class="text-xs text-muted-foreground">Gestão administrativa do laboratório</p>
      </div>
    </div>

    <h1 class="mb-6 text-2xl font-semibold tracking-tight text-foreground">Entrar</h1>

    <form [formGroup]="form" (ngSubmit)="onLogin()" class="flex flex-col gap-4" novalidate>

      <div class="flex flex-col gap-1">
        <label for="email" class="text-sm font-medium text-foreground">E-mail</label>
        <input
          pInputText
          id="email"
          formControlName="email"
          type="email"
          autocomplete="email"
          placeholder="voce@laboratorio.com"
          class="w-full"
        />
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <span class="text-xs text-red-500">Informe um e-mail válido.</span>
        }
      </div>

      <div class="flex flex-col gap-1">
        <label for="password" class="text-sm font-medium text-foreground">Senha</label>
        <p-password
          inputId="password"
          formControlName="password"
          [feedback]="false"
          [toggleMask]="true"
          styleClass="w-full"
          inputStyleClass="w-full"
        />
        @if (form.get('password')?.invalid && form.get('password')?.touched) {
          <span class="text-xs text-red-500">Informe a senha.</span>
        }
      </div>

      @if (errorMessage()) {
        <p-message severity="error" [text]="errorMessage()" styleClass="w-full" />
      }

      <p-button
        type="submit"
        label="Entrar"
        styleClass="w-full"
        [loading]="loading()"
      />

      <a
        routerLink="/forgot-password"
        class="text-center text-sm text-primary hover:underline"
      >
        Esqueci minha senha
      </a>

    </form>
  </div>
</div>
