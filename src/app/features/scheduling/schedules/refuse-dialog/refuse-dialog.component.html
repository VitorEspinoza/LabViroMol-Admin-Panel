<p-dialog
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  header="Rejeitar Agendamento"
  [modal]="true"
  [closable]="true"
  [style]="{ width: '95vw', maxWidth: '480px' }"
  (onShow)="onDialogShow()"
>
  <form [formGroup]="form" novalidate>
    <div class="flex flex-col gap-1 py-4">
      <label for="justification" class="text-sm font-medium">Justificativa <span class="text-red-500">*</span></label>
      <textarea
        pTextarea
        id="justification"
        formControlName="justification"
        rows="4"
        class="w-full"
        placeholder="Informe o motivo da rejeição..."
        [class.border-red-500]="form.get('justification')?.errors?.['required'] && form.get('justification')?.touched"
      ></textarea>
      @if (form.get('justification')?.errors?.['required'] && form.get('justification')?.touched) {
        <span class="text-xs text-red-500">Justificativa é obrigatória.</span>
      }
    </div>
  </form>

  <ng-template #footer>
    <div class="flex justify-end gap-2">
      <p-button label="Cancelar" [outlined]="true" severity="secondary" (onClick)="onCancel()" [disabled]="saving()" />
      <p-button label="Confirmar Rejeição" severity="danger" [loading]="saving()" (onClick)="onConfirm()" />
    </div>
  </ng-template>
</p-dialog>
