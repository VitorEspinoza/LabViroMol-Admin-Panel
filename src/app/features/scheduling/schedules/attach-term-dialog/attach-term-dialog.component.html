<p-dialog
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  header="Anexar Termo"
  [modal]="true"
  [closable]="true"
  [style]="{ width: '95vw', maxWidth: '480px' }"
  (onShow)="onDialogShow()"
>
  <div class="flex flex-col gap-3 py-4">
    @if (!selectedFile()) {
      <div class="flex flex-col items-center justify-center gap-2 border-2 border-dashed border-border rounded-lg py-10 px-4 text-center">
        <i class="pi pi-cloud-upload text-3xl text-muted-foreground" aria-hidden="true"></i>
        <p class="text-sm text-muted-foreground">
          Arraste o arquivo aqui ou
          <button type="button" class="text-primary hover:underline font-medium" (click)="triggerFileSelect()">
            selecione um arquivo
          </button>
        </p>
        <p class="text-xs text-muted-foreground">Formatos aceitos: PDF, DOC, DOCX, JPG, PNG</p>
      </div>
    } @else {
      <div class="flex items-center justify-between gap-3 border border-border rounded-lg p-3">
        <div class="flex items-center gap-2 overflow-hidden">
          <i class="pi pi-file text-xl text-muted-foreground shrink-0" aria-hidden="true"></i>
          <div class="overflow-hidden">
            <p class="text-sm font-medium truncate">{{ selectedFile()!.name }}</p>
            <p class="text-xs text-muted-foreground">{{ formatFileSize(selectedFile()!.size) }}</p>
          </div>
        </div>
        <p-button icon="pi pi-times" [text]="true" [rounded]="true" severity="danger" size="small" (onClick)="removeFile()" />
      </div>
    }

    <input
      #fileInput
      type="file"
      accept=".pdf,.doc,.docx,.jpg,.jpeg,.png,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,image/jpeg,image/png"
      class="hidden"
      (change)="onFileSelected($event)"
    />
  </div>

  <ng-template #footer>
    <div class="flex justify-end gap-2">
      <p-button label="Cancelar" [outlined]="true" severity="secondary" (onClick)="onCancel()" [disabled]="saving()" />
      <p-button label="Enviar" [loading]="saving()" [disabled]="!selectedFile()" (onClick)="onUpload()" />
    </div>
  </ng-template>
</p-dialog>
