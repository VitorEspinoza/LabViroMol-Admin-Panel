<nav
  [class]="navClasses()"
  (mouseenter)="startHover()"
  (mouseleave)="endHover()"
  aria-label="Menu principal"
>
  <div
    class="flex items-center px-4 py-5 border-b border-sidebar-border shrink-0"
    [class.justify-between]="!displayCollapsed()"
    [class.justify-center]="displayCollapsed()"
  >
    <div class="flex items-center overflow-hidden" [class.gap-3]="!displayCollapsed()">
      @if (!displayCollapsed()) {
        <div class="flex items-center justify-center w-8 h-8 rounded-md bg-white shrink-0 p-1">
          <img
            ngSrc="images/logo.png"
            alt="Logo LabViroMol"
            width="24"
            height="24"
            priority
          />
        </div>
      }
      <div
        class="overflow-hidden whitespace-nowrap transition-all duration-300 ease-in-out"
        [style.maxWidth]="displayCollapsed() ? '0' : '12rem'"
        [style.opacity]="displayCollapsed() ? '0' : '1'"
      >
        <p class="font-semibold text-sidebar-foreground leading-tight">LabViroMol</p>
        <p class="text-xs text-sidebar-muted-foreground">Gestão Administrativa</p>
      </div>
    </div>
    <button
      type="button"
      class="flex items-center justify-center w-6 h-6 rounded hover:bg-sidebar-accent transition-colors text-sidebar-muted-foreground shrink-0"
      (click)="onToggleCollapseClick()"
      [attr.aria-label]="displayCollapsed() ? 'Expandir menu' : 'Recolher menu'"
    >
      <i
        class="pi pi-chevron-left text-xs transition-transform duration-300 ease-in-out"
        [style.transform]="displayCollapsed() ? 'rotate(180deg)' : 'rotate(0deg)'"
        aria-hidden="true"
      ></i>
    </button>
  </div>

  <div class="flex flex-col gap-1 flex-1 overflow-y-auto p-3">

    <a
      routerLink="/dashboard"
      routerLinkActive="bg-sidebar-accent text-sidebar-accent-foreground font-medium"
      [routerLinkActiveOptions]="{ exact: true }"
      class="flex items-center px-3 py-2 rounded-lg text-sm text-sidebar-foreground hover:bg-sidebar-accent transition-colors"
      [class.gap-3]="!displayCollapsed()"
      [class.justify-center]="displayCollapsed()"
    >
      <i class="pi pi-home text-base shrink-0" aria-hidden="true"></i>
      <span
        class="overflow-hidden whitespace-nowrap transition-all duration-300 ease-in-out"
        [style.maxWidth]="displayCollapsed() ? '0' : '12rem'"
        [style.opacity]="displayCollapsed() ? '0' : '1'"
      >Dashboard</span>
    </a>

    <div class="border-t border-sidebar-border my-2"></div>

    @for (group of visibleGroups(); track group.key) {
      <div>
        <button
          type="button"
          class="w-full flex items-center px-3 py-2 rounded-lg text-sm text-sidebar-foreground
                 hover:bg-sidebar-accent transition-colors cursor-pointer"
          [class.gap-3]="!displayCollapsed()"
          [class.justify-center]="displayCollapsed()"
          (click)="toggleGroup(group.key)"
          [attr.aria-expanded]="displayCollapsed() ? null : groupOpen()[group.key]"
          [attr.aria-controls]="displayCollapsed() ? null : 'group-' + group.key"
        >
          <i [class]="group.icon + ' text-base shrink-0'" aria-hidden="true"></i>
          <span
            class="flex-1 text-left overflow-hidden whitespace-nowrap transition-all duration-300 ease-in-out"
            [style.maxWidth]="displayCollapsed() ? '0' : '12rem'"
            [style.opacity]="displayCollapsed() ? '0' : '1'"
          >{{ group.label }}</span>
          <i
            class="pi pi-chevron-down text-xs overflow-hidden transition-all duration-300 ease-in-out"
            [style.maxWidth]="displayCollapsed() ? '0' : '1.5rem'"
            [style.opacity]="displayCollapsed() ? '0' : '1'"
            [style.transform]="groupOpen()[group.key] ? 'rotate(-180deg)' : 'rotate(0deg)'"
            aria-hidden="true"
          ></i>
        </button>

        <div
          [id]="'group-' + group.key"
          class="grid transition-all duration-300 ease-in-out"
          [style.gridTemplateRows]="!displayCollapsed() && groupOpen()[group.key] ? '1fr' : '0fr'"
        >
          <div class="overflow-hidden">
            <div class="ml-4 mt-1 flex flex-col gap-0.5 pb-1">
              @for (item of group.visibleItems; track item.route) {
                <a
                  [routerLink]="item.route"
                  routerLinkActive="bg-sidebar-accent text-sidebar-accent-foreground font-medium"
                  class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-sidebar-foreground
                         hover:bg-sidebar-accent transition-colors"
                >
                  <i [class]="item.icon + ' text-sm shrink-0'" aria-hidden="true"></i>
                  <span>{{ item.label }}</span>
                </a>
              }
            </div>
          </div>
        </div>
      </div>
    }
  </div>

  <div class="border-t border-sidebar-border px-4 py-3 shrink-0">
    <span
      class="text-xs text-sidebar-muted-foreground overflow-hidden whitespace-nowrap transition-all duration-300 ease-in-out block"
      [style.maxWidth]="displayCollapsed() ? '0' : '12rem'"
      [style.opacity]="displayCollapsed() ? '0' : '1'"
    >v{{ version }}</span>
  </div>
</nav>
