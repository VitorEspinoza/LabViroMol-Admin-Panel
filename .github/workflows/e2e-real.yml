name: E2E Real (backend efêmero, pre-merge)

on:
  merge_group:
  workflow_dispatch:

concurrency:
  group: e2e-real-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BACKEND_REPO: VitorEspinoza/LabViroMol
  BACKEND_REF: main
  E2E_API_URL: http://localhost:8080
  E2E_ADMIN_EMAIL: admin@labviromol.test
  E2E_ADMIN_PASSWORD: E2eAdmin123!

jobs:
  e2e-real:
    name: E2E real (Playwright + backend efêmero)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout admin panel
        uses: actions/checkout@v4

      - name: Checkout backend (LabViroMol)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BACKEND_REPO }}
          ref: ${{ env.BACKEND_REF }}
          path: backend

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Subir backend efêmero (Postgres + migrate + API)
        working-directory: backend
        run: |
          docker compose -f docker-compose.ci.yaml up -d --wait
        env:
          FRONTEND_BASE_URL: http://localhost:4200
          CORS_ORIGIN: http://localhost:4200

      - name: "[BLOQUEADO] Seed do usuário admin no backend efêmero"
        run: |
          echo "::warning::Backend ainda não expõe bootstrap/seed de usuário admin." \
            "Login real em e2e/global-setup.ts vai falhar até essa lacuna ser resolvida" \
            "(ver plans/ci-cd/DEVIATIONS.md, plano 13)."

      - name: Build Angular (produção)
        run: npx ng build --configuration production

      - name: Rodar suíte E2E real
        run: npm run e2e
        env:
          E2E_API_URL: ${{ env.E2E_API_URL }}
          E2E_ADMIN_EMAIL: ${{ env.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ env.E2E_ADMIN_PASSWORD }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test-results (traces)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14

      - name: Derrubar stack efêmera
        if: always()
        working-directory: backend
        run: docker compose -f docker-compose.ci.yaml down -v
