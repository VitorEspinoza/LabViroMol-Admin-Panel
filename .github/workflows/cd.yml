name: CD

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'agents/**'

env:
  IMAGE_NAME: ghcr.io/vitorespinoza/labviromol-admin

jobs:
  container-scan:
    name: Container scan (gate)
    uses: ./.github/workflows/container-scan.yml
    permissions:
      contents: read
      security-events: write

  build-push:
    name: Build + push (signed)
    needs: container-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: image-sbom.cdx.json

      - name: Attest SBOM
        uses: actions/attest-sbom@v2
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: image-sbom.cdx.json
          push-to-registry: true

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (cosign keyless)
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign sign --yes "${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"

  deploy:
    name: Deploy admin (droplet)
    needs: build-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH (docker rollout, zero-downtime)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd ~/app
            ADMIN_TAG=${{ github.sha }} docker compose -f docker-compose.prod.yaml pull admin
            ADMIN_TAG=${{ github.sha }} docker rollout -f docker-compose.prod.yaml admin

      - name: Health check (post-deploy)
        run: |
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://lab.vitorespinoza.com/gestao-lab-ufpr/ || echo "000")
            if [ "$status" = "200" ]; then
              echo "Health check OK (200)"
              exit 0
            fi
            echo "Attempt $i: status=$status, retrying..."
            sleep 5
          done
          echo "Health check failed after retries" >&2
          exit 1

      - name: Rollback on failure (previous sha)
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd ~/app
            echo "Rollback: re-deploying previous known-good tag is a manual/runbook step today (no automatic 'previous sha' tracking yet)."
