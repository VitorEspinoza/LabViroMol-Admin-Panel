name: Dynamic (DAST)

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'agents/**'

permissions:
  contents: read

jobs:
  zap-baseline:
    name: OWASP ZAP baseline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t admin-dast .

      - name: Run container
        run: docker run -d -p 8080:80 --name admin-dast admin-dast

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/ > /dev/null; then
              echo "App is up"
              exit 0
            fi
            sleep 1
          done
          echo "App did not become ready in time" >&2
          exit 1

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:8080'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          fail_action: true

      - name: Teardown container
        if: always()
        run: docker rm -f admin-dast || true
