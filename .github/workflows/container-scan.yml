name: Container scan

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'agents/**'
  workflow_call:
    outputs:
      image-ref:
        description: 'Local image ref scanned'
        value: ${{ jobs.scan.outputs.image-ref }}

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: Build + Trivy image scan
    runs-on: ubuntu-latest
    outputs:
      image-ref: ${{ steps.meta.outputs.image-ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image ref
        id: meta
        run: echo "image-ref=admin-container-scan:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local, not pushed)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.image-ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.meta.outputs.image-ref }}
          scan-type: 'image'
          scanners: 'vuln,misconfig,secret'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-image-results.sarif'

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-image-results.sarif'
